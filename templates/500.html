<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ошибка сервера | АИС УЗМО</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eef6fc 0%, #f8fbff 45%, #e8f2fa 100%);
      font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #172033;
    }
    .card {
      width: min(440px, calc(100% - 2rem));
      text-align: center;
      background: #fff;
      border: 1px solid #d7e4ef;
      border-radius: 8px;
      padding: 2.4rem 2rem;
      box-shadow: 0 18px 40px rgba(23,105,170,.14);
    }
    .code { color: #d7e4ef; font-size: 2.6rem; font-weight: 800; line-height: 1; }
    h1 { font-size: 1.25rem; color: #0b2f5b; margin: .5rem 0; }
    p { color: #6a788b; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">500</div>
    <h1>Внутренняя ошибка сервера</h1>
    <p>Произошла внутренняя ошибка. Попробуйте обновить страницу через некоторое время.</p>
  </div>
</body>
</html>
