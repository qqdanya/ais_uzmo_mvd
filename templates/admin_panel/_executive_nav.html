<div class="admin-command-head admin-executive-head">
  <div>
    <h1>Административная панель</h1>
    <p>Сводная информация по заявкам, сотрудникам и материальной базе</p>
  </div>
  <div class="admin-command-actions">
    <a class="btn btn-sm btn-outline-primary" href="{% url 'audit_log' %}">
      <i class="bi bi-activity"></i>
      Журнал действий
    </a>
    <a class="btn btn-sm {% if active_tab == 'settings' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="{% url 'admin_threshold_settings' %}">
      <i class="bi bi-sliders"></i>
      Настройки
    </a>
    {% if user.is_superuser %}
      <a class="btn btn-sm btn-outline-secondary" href="{% url 'admin:index' %}">
        <i class="bi bi-database"></i>
        Таблицы БД
      </a>
    {% endif %}
  </div>
</div>

<nav class="admin-top-tabs" aria-label="Разделы административной панели">
  <a class="admin-top-tab{% if active_tab == 'summary' %} active{% endif %}" href="{% url 'admin_panel' %}">
    <i class="bi bi-speedometer2"></i>
    Оперативная сводка
  </a>
  <a class="admin-top-tab{% if active_tab == 'requests' %} active{% endif %}" href="{% url 'admin_requests_panel' %}">
    <i class="bi bi-inboxes"></i>
    Заявки
  </a>
  <a class="admin-top-tab{% if active_tab == 'organs' %} active{% endif %}" href="{% url 'admin_organs_panel' %}">
    <i class="bi bi-geo-alt"></i>
    Территориальные органы
  </a>
  <a class="admin-top-tab{% if active_tab == 'departments' %} active{% endif %}" href="{% url 'admin_departments_panel' %}">
    <i class="bi bi-diagram-3"></i>
    Отделы
  </a>
  <a class="admin-top-tab{% if active_tab == 'assets' %} active{% endif %}" href="{% url 'admin_assets_panel' %}">
    <i class="bi bi-box-seam"></i>
    Материальная база
  </a>
  <a class="admin-top-tab{% if active_tab == 'employees' %} active{% endif %}" href="{% url 'admin_employees_panel' %}">
    <i class="bi bi-people"></i>
    Сотрудники
  </a>
  <a class="admin-top-tab admin-top-tab-separated{% if active_tab == 'trash' %} active{% endif %}" href="{% url 'admin_trash_panel' %}">
    <i class="bi bi-trash3"></i>
    Корзина
  </a>
</nav>
