<div class="request-photo-box" data-request-photo-box>
  <div id="request-photo-selected" data-request-photo-selected>
    {% for photo_id in attached_photo_ids %}
      <input type="hidden" name="attached_photos" value="{{ photo_id }}" data-request-photo-hidden>
    {% endfor %}
  </div>
  <div class="request-photo-summary">
    <div>
      <div class="form-label mb-1">Фотографии к заявке</div>
      <div class="small text-secondary"><span data-request-photo-count>{{ attached_photo_count }}</span> прикреплено</div>
    </div>
    <button class="btn btn-sm btn-outline-primary" type="button" data-request-photo-toggle>
      <i class="bi bi-images"></i> Прикрепить фотографии
    </button>
  </div>
  <div class="request-photo-picker" data-request-photo-panel hidden>
    {% include "partials/request_photo_picker_panel.html" %}
  </div>
</div>
