<form method="post" enctype="multipart/form-data" hx-encoding="multipart/form-data" hx-post="{{ request.path }}" hx-target="#workspace" data-bulk-photo-form data-bulk-refresh-url="{% url 'photos' organ.pk %}{% if current_folder %}?folder={{ current_folder.pk }}{% endif %}">
  <div class="modal-header">
    <h5 class="modal-title">Загрузка фотографий</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
  </div>
  <div class="modal-body">
    {% csrf_token %}
    {% if current_folder %}<input type="hidden" name="folder" value="{{ current_folder.pk }}">{% endif %}
    <input type="file" name="images" accept="image/*" multiple hidden data-bulk-photo-input>
    <div class="form-grid one-col">
      <div class="upload-meta"><i class="bi bi-folder2-open"></i> {% if current_folder %}Загрузка в папку «{{ current_folder.name }}»{% else %}Загрузка без папки{% endif %}</div>
      {% if not current_folder %}
      <div class="form-field wide">
        <label class="form-label" for="bulk-new-folder">Новая папка</label>
        <input class="form-control" id="bulk-new-folder" name="new_folder" placeholder="Заполните, если нужно создать новую папку">
      </div>
      {% endif %}
    </div>
    <button class="btn btn-outline-primary mt-3" type="button" data-bulk-photo-picker><i class="bi bi-images"></i> Выбрать изображения</button>
    <div class="bulk-photo-list mt-3" data-bulk-photo-list></div>
    <div class="bulk-upload-progress mt-3" data-bulk-upload-progress hidden>
      <div class="bulk-upload-progress-head">
        <strong>Загрузка фотографий</strong>
        <span data-bulk-upload-counter>0 / 0</span>
      </div>
      <div class="bulk-upload-track" aria-hidden="true">
        <div class="bulk-upload-bar" data-bulk-upload-bar></div>
      </div>
      <div class="bulk-upload-note" data-bulk-upload-note>Подготовка к загрузке...</div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
    <button class="btn btn-primary" data-bulk-upload-submit><i class="bi bi-cloud-arrow-up"></i> Загрузить</button>
  </div>
</form>
