<div class="organ-info">
  <div>
    <div class="small text-secondary">Выбранный территориальный орган</div>
    <strong>{{ organ.name }}</strong>
    <div class="mt-2">
      <button class="organ-photo-btn" type="button" hx-get="{% url 'photos' organ.pk %}" hx-target="#workspace" hx-swap="innerHTML">
        <span class="organ-photo-btn-icon"><i class="bi bi-images"></i></span>
        <span class="organ-photo-btn-label">Фотографии</span>
        <i class="bi bi-chevron-right organ-photo-btn-arrow" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>
{% if update_dashboard_subunits %}
  {% include "partials/organ_subunits.html" with oob=True %}
{% endif %}
