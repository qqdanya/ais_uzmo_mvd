<div class="organ-info">
  <div>
    <div class="small text-secondary">Выбранный территориальный орган</div>
    <strong>{{ organ.name }}</strong>
    <div class="mt-2">
      <button class="btn btn-sm btn-outline-primary organ-photo-btn w-100" hx-get="{% url 'photos' organ.pk %}" hx-target="#workspace" hx-swap="innerHTML">
        <i class="bi bi-images"></i> Фотографии
      </button>
    </div>
  </div>
</div>
{% if organ.children.exists %}
  <div class="subunits">{% for child in organ.children.all %}<span>{{ child.name }}</span>{% endfor %}</div>
{% endif %}
