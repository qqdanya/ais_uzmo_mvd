{% if obj.attached_photos %}
  <div class="request-photo-thumbnails" data-lightbox-scope data-lightbox-group="request-{{ obj.territorial_organ_id }}-{{ table.key }}-{{ obj.pk }}" aria-label="Прикрепленные фотографии">
    {% for photo in obj.attached_photos %}
      {% if photo.image %}
        <button class="request-photo-thumbnail{% if forloop.counter > 3 %} request-photo-thumbnail-hidden{% endif %}" type="button" data-lightbox-photo data-lightbox-group="request-{{ obj.territorial_organ_id }}-{{ table.key }}-{{ obj.pk }}" data-src="{{ photo.image.url }}" data-download-url="{% url 'photo_download' photo.territorial_organ.pk photo.pk %}" data-description="{{ photo.description|default:'Описание не добавлено' }}" data-meta="{{ photo.created_at|date:'d.m.Y H:i' }} · {{ photo.created_by|default:'-' }}" aria-label="Открыть фотографию {{ forloop.counter }}" {% if forloop.counter > 3 %}hidden{% endif %}>
          {% if forloop.counter <= 3 %}
            <img src="{{ photo.thumbnail_small_url }}" alt="{{ photo.description|default:photo.original_filename|default:'Фотография заявки' }}" loading="lazy" decoding="async">
          {% endif %}
        </button>
      {% endif %}
    {% endfor %}
    {% if obj.attached_photo_extra_count %}
      <button class="request-photo-thumbnail request-photo-thumbnail-more" type="button" hx-get="{% url 'request_photos' obj.territorial_organ.pk table.key obj.pk %}" hx-target="#modal-content" data-open-modal="true" aria-label="Показать все фотографии заявки">
        +{{ obj.attached_photo_extra_count }}
      </button>
    {% endif %}
  </div>
{% endif %}
