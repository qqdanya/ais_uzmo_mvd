<div class="workspace-sticky">
  <div class="workspace-head">
    <div>
      <div class="small text-secondary">{{ organ.name }}</div>
      <h1>{{ department.name }}</h1>
    </div>
  </div>
  <ul class="nav nav-tabs">
    {% for item in tables %}
      <li class="nav-item">
        <button class="nav-link {% if forloop.first %}active{% endif %}" data-table-tab="true" hx-get="{% url 'table_data' organ.pk item.key %}" hx-target="#table-area" hx-swap="innerHTML">{{ item.parent_title|default:item.title }}</button>
      </li>
    {% endfor %}
  </ul>
</div>
<div id="table-area" class="pt-3" hx-get="{% url 'table_data' organ.pk active_table.key %}" hx-trigger="load" hx-swap="innerHTML">
  <div class="loading">Загрузка...</div>
</div>
